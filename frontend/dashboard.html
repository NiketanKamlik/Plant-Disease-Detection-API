<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PlantCare AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <div class="bg-animated">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
        <div class="noise-overlay"></div>
    </div>

    <nav class="glass-nav">
        <div class="nav-container">
            <a href="/" class="logo" style="text-decoration: none; color: inherit;">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none">
                    <path d="M12 22C12 22 20 18 20 12C20 6 12 2 12 2C12 2 4 6 4 12C4 18 12 22 12 22Z" fill="#10B981"/>
                    <path d="M12 22V12" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span class="logo-text">PlantCare <span class="highlight">API</span></span>
            </a>
            <div class="auth-buttons" id="navAuth">
                <button class="btn btn-ghost">Loading...</button>
            </div>
        </div>
    </nav>

    <main class="dashboard-main">
        <div class="dashboard-container">
            <aside class="sidebar fade-in-up">
                <a href="/dashboard" class="sidebar-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    API Keys
                </a>
                <a href="/info" class="sidebar-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg>
                    Best Practices
                </a>
                <a href="/upload" class="sidebar-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    Manual Scan
                </a>
            </aside>

            <section class="content-area glass-panel fade-in-up delay-1">
                <div class="section-header">
                    <div>
                        <h2>API <span class="highlight">Management</span></h2>
                        <p>Manage your access keys for programmatic disease detection.</p>
                    </div>
                    <button class="btn btn-primary" onclick="generateNewKey()">+ Generate New Key</button>
                </div>

                <div id="keysList">
                    <div class="empty-state">Loading keys...</div>
                </div>

                <div class="mt-4" style="padding: 1.5rem; background: rgba(16, 185, 129, 0.05); border-radius: 12px; border: 1px solid rgba(16, 185, 129, 0.1);">
                    <h4 style="color: var(--primary); margin-bottom: 0.5rem;">Quick Integration</h4>
                    <pre style="background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; font-size: 0.85rem; overflow-x: auto; color: var(--text-muted);">
curl -X POST http://127.0.0.1:8000/api/predict \
  -H "X-API-Key: YOUR_KEY_HERE" \
  -F "file=@plant_leaf.jpg"</pre>
                </div>
            </section>
        </div>
    </main>
    <script src="/frontend/script.js"></script>
</body>
</html>
